name: version-develop

# On push to develop: bump the patch number and tag (numeric SemVer, no pre-release).
# e.g. 0.1.0 -> 0.1.1 -> 0.1.2 ...
# Uses VERSION_BUMP_TOKEN so the bump commit does not retrigger CI in a loop.

on:
  push:
    branches:
      - develop

permissions:
  contents: write

concurrency:
  group: version-develop
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip the commit that the bump itself produced.
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          fetch-depth: 0
          ref: develop

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bump-my-version
        run: pip install bump-my-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch
        run: bump-my-version bump patch --verbose

      - name: Push commit and tags
        run: git push origin develop --follow-tags
