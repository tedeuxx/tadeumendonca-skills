name: release

# Trunk-based deliberate release. `main` is the integration line — pushes do NOT
# auto-version. A release is cut on demand from this workflow:
#   Actions -> release -> Run workflow -> choose part (major | minor | patch).
# It bumps VERSION + plugin.json, tags vX.Y.Z, pushes, and publishes a GitHub Release.
# Uses VERSION_BUMP_TOKEN so the bump commit does not retrigger CI in a loop.

on:
  workflow_dispatch:
    inputs:
      part:
        description: "Which SemVer part to bump"
        required: true
        type: choice
        default: minor
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bump-my-version
        run: pip install bump-my-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: bump-my-version bump ${{ inputs.part }} --verbose

      - name: Push commit and tags
        run: git push origin main --follow-tags

      - name: Read new version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build categorized release notes (commits since the previous release)
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          NEW="v${{ steps.version.outputs.version }}"
          PREV=$(gh release list --exclude-drafts --json tagName \
            --jq "[.[].tagName | select(. != \"$NEW\")] | .[0]" 2>/dev/null || true)
          RANGE="${PREV:+$PREV..}$NEW"
          log() { git log --no-merges --pretty='%s%x09%h' "$RANGE" | grep -v '^bump:'; }
          section() {  # $1 = heading, $2 = alternation of conventional-commit types
            body=$(log | grep -iE "^($2)(\(.+\))?!?:" \
              | sed -E "s/^($2)(\([^)]*\))?!?:[[:space:]]*//I" \
              | awk -F'\t' '{print "- " $1 " (" $2 ")"}')
            if [ -n "$body" ]; then printf '### %s\n%s\n\n' "$1" "$body"; fi
          }
          {
            section "✨ Features" "feat|feature"
            section "🐛 Fixes" "fix"
            section "📝 Documentation" "docs"
            section "♻️ Refactoring" "refactor"
            section "⚙️ CI & chores" "ci|chore|build|test"
            other=$(log | grep -ivE "^(feat|feature|fix|docs|refactor|ci|chore|build|test|style|perf)(\(.+\))?!?:" \
              | awk -F'\t' '{print "- " $1 " (" $2 ")"}')
            if [ -n "$other" ]; then printf '### Other\n%s\n\n' "$other"; fi
            if [ -n "$PREV" ]; then echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/$PREV...$NEW"; fi
          } > RELEASE_NOTES.md
          echo "Generated notes for $RANGE:"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
