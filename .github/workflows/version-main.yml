name: version-main

# On merge to main: read the merged PR's semver label, bump the corresponding
# part, tag, and publish a GitHub Release.
#   semver:major -> major | semver:minor -> minor (default) | semver:patch -> patch
# Uses VERSION_BUMP_TOKEN so the bump commit does not retrigger CI in a loop.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the commit that the bump itself produced.
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bump-my-version
        run: pip install bump-my-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve bump part from PR label
        id: bump_part
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          # Find the PR merged by this push commit and read its semver:* label.
          labels=$(gh pr list --state merged --search "${{ github.sha }}" \
            --json labels --jq '.[0].labels[].name' || true)
          part="minor"  # default
          if echo "$labels" | grep -q "semver:major"; then
            part="major"
          elif echo "$labels" | grep -q "semver:patch"; then
            part="patch"
          fi
          echo "part=$part" >> "$GITHUB_OUTPUT"
          echo "Resolved bump part: $part"

      - name: Bump version
        run: bump-my-version bump ${{ steps.bump_part.outputs.part }} --verbose

      - name: Push commit and tags
        run: git push origin main --follow-tags

      - name: Read new version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build categorized release notes (commits since the previous release)
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          NEW="v${{ steps.version.outputs.version }}"
          # previous *release* — only main publishes Releases, so this skips the per-commit
          # develop tags (v0.1.x). The new release isn't created yet, so exclude NEW defensively.
          PREV=$(gh release list --exclude-drafts --json tagName \
            --jq "[.[].tagName | select(. != \"$NEW\")] | .[0]" 2>/dev/null || true)
          RANGE="${PREV:+$PREV..}$NEW"
          log() { git log --no-merges --pretty='%s%x09%h' "$RANGE" | grep -v '^bump:'; }
          section() {  # $1 = heading, $2 = alternation of conventional-commit types
            body=$(log | grep -iE "^($2)(\(.+\))?!?:" \
              | sed -E "s/^($2)(\([^)]*\))?!?:[[:space:]]*//I" \
              | awk -F'\t' '{print "- " $1 " (" $2 ")"}')
            [ -n "$body" ] && printf '### %s\n%s\n\n' "$1" "$body"
          }
          {
            section "✨ Features" "feat|feature"
            section "🐛 Fixes" "fix"
            section "📝 Documentation" "docs"
            section "♻️ Refactoring" "refactor"
            section "⚙️ CI & chores" "ci|chore|build|test"
            other=$(log | grep -ivE "^(feat|feature|fix|docs|refactor|ci|chore|build|test|style|perf)(\(.+\))?!?:" \
              | awk -F'\t' '{print "- " $1 " (" $2 ")"}')
            [ -n "$other" ] && printf '### Other\n%s\n\n' "$other"
            [ -n "$PREV" ] && echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/$PREV...$NEW"
          } > RELEASE_NOTES.md
          echo "Generated notes for $RANGE:"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
